<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EconDataHub Report</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d2e;
            --surface-alt: #232740;
            --border: #2e3348;
            --text: #e1e4ed;
            --text-muted: #8a8fa8;
            --accent: #6c8aff;
            --accent-glow: rgba(108, 138, 255, 0.15);
            --green: #34d399;
            --green-bg: rgba(52, 211, 153, 0.1);
            --green-border: rgba(52, 211, 153, 0.3);
            --red: #f87171;
            --red-bg: rgba(248, 113, 113, 0.1);
            --red-border: rgba(248, 113, 113, 0.3);
            --yellow: #fbbf24;
            --yellow-bg: rgba(251, 191, 36, 0.1);
            --yellow-border: rgba(251, 191, 36, 0.3);
            --orange: #fb923c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #1a1d2e 0%, #252a4a 100%);
            border-bottom: 1px solid var(--border);
            padding: 2rem 2rem 1.5rem;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo svg { width: 36px; height: 36px; }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .logo h1 span { color: var(--accent); }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: var(--accent-glow);
            border: 1px solid rgba(108, 138, 255, 0.3);
            border-radius: 999px;
            font-size: 0.8rem;
            color: var(--accent);
        }

        .header-badge .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .container { max-width: 1280px; margin: 0 auto; padding: 2rem; }

        /* Loading */
        #loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 6rem 2rem; gap: 1.5rem;
        }

        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: var(--text-muted); font-size: 0.95rem; }

        /* Error */
        .error-box {
            background: var(--red-bg); border: 1px solid var(--red-border);
            border-radius: 12px; padding: 1.5rem; color: var(--red); text-align: center;
        }

        /* Section titles */
        .section-title {
            font-size: 1.1rem; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .section-title::before {
            content: ''; width: 4px; height: 20px;
            background: var(--accent); border-radius: 2px;
        }

        /* ===== TREND OVERVIEW (diverging bar chart) ===== */
        .trend-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem 1.5rem 1rem; margin-bottom: 2.5rem;
        }

        .trend-row {
            display: grid;
            grid-template-columns: 200px 1fr 70px;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .trend-row:last-child { border-bottom: none; }

        .trend-label {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.82rem; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .trend-label .flag { font-size: 1.1rem; }

        .trend-bar-track {
            position: relative; height: 28px;
            background: var(--surface-alt); border-radius: 4px;
        }

        /* center line */
        .trend-bar-track::after {
            content: ''; position: absolute;
            left: 50%; top: 0; bottom: 0; width: 1px;
            background: var(--text-muted); opacity: 0.3;
        }

        .trend-bar-fill {
            position: absolute; top: 4px; bottom: 4px;
            border-radius: 3px;
            transition: width 0.8s ease, left 0.8s ease;
            min-width: 2px;
        }

        .trend-bar-fill.positive { background: var(--green); }
        .trend-bar-fill.negative { background: var(--red); }

        .trend-pct {
            font-size: 0.82rem; font-weight: 700; text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .trend-pct.positive { color: var(--green); }
        .trend-pct.negative { color: var(--red); }

        .trend-legend {
            display: flex; gap: 1.5rem; margin-top: 0.75rem;
            font-size: 0.72rem; color: var(--text-muted); justify-content: center;
        }
        .trend-legend span { display: flex; align-items: center; gap: 0.35rem; }
        .trend-legend .swatch { width: 10px; height: 10px; border-radius: 2px; }

        /* ===== TIMELINE GANTT ===== */
        .timeline-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem; margin-bottom: 2.5rem;
            overflow-x: auto;
        }

        .timeline-panel .note {
            font-size: 0.78rem; color: var(--yellow); margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.4rem;
        }

        .timeline-axis {
            position: relative; margin-left: 200px; height: 24px;
            border-bottom: 1px solid var(--border); margin-bottom: 0.5rem;
        }

        .timeline-tick {
            position: absolute; bottom: 0; transform: translateX(-50%);
            font-size: 0.68rem; color: var(--text-muted); white-space: nowrap;
            padding-bottom: 4px;
        }

        .timeline-tick::after {
            content: ''; position: absolute;
            left: 50%; bottom: 0; width: 1px; height: 6px;
            background: var(--text-muted); opacity: 0.4;
        }

        .timeline-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            align-items: center;
            gap: 0;
            padding: 3px 0;
        }

        .timeline-label {
            font-size: 0.78rem; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding-right: 0.75rem;
        }

        .timeline-track {
            position: relative; height: 18px;
        }

        .timeline-bar {
            position: absolute; top: 3px; bottom: 3px;
            border-radius: 3px; opacity: 0.85;
            transition: left 0.5s ease, width 0.5s ease;
        }

        .timeline-bar.cat-spread  { background: var(--accent); }
        .timeline-bar.cat-bond    { background: var(--orange); }
        .timeline-bar.cat-unemp   { background: #a78bfa; }

        .timeline-duration {
            position: absolute; right: -4px; top: 50%; transform: translate(100%, -50%);
            font-size: 0.65rem; color: var(--text-muted); white-space: nowrap;
            padding-left: 6px;
        }

        .timeline-cat-legend {
            display: flex; gap: 1.5rem; margin-top: 0.75rem;
            font-size: 0.72rem; color: var(--text-muted); justify-content: center;
        }
        .timeline-cat-legend span { display: flex; align-items: center; gap: 0.35rem; }
        .timeline-cat-legend .swatch { width: 10px; height: 10px; border-radius: 2px; }

        /* ===== CARDS ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1rem; margin-bottom: 2.5rem;
        }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.25rem;
            transition: border-color 0.2s, transform 0.2s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.6rem;
        }
        .card-country { display: flex; align-items: center; gap: 0.5rem; }
        .card-flag { font-size: 1.4rem; line-height: 1; }
        .card-country-name { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .card-indicator {
            font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 999px;
            background: var(--surface-alt); color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.04em;
        }

        .card-values {
            display: flex; align-items: baseline; gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 2rem; font-weight: 700; color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .card-prev {
            font-size: 0.85rem; color: var(--text-muted);
            display: flex; align-items: center; gap: 0.3rem;
        }

        .card-prev .arrow { font-size: 0.7rem; }

        .card-change {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.85rem; font-weight: 600; padding: 0.25rem 0.6rem;
            border-radius: 6px;
        }
        .card-change.positive { color: var(--green); background: var(--green-bg); }
        .card-change.negative { color: var(--red); background: var(--red-bg); }

        /* Mini trend arrow in card */
        .card-trend-arrow {
            display: inline-block; margin-left: 0.4rem;
        }
        .card-trend-arrow svg { vertical-align: middle; }

        .card-bar { margin-top: 0.75rem; height: 6px; border-radius: 3px; background: var(--surface-alt); overflow: hidden; position: relative; }
        .card-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

        .card-period {
            margin-top: 0.75rem;
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
        }

        .card-period-dates {
            font-size: 0.75rem; color: var(--text-muted);
        }

        .card-duration-badge {
            font-size: 0.68rem; font-weight: 600; padding: 0.15rem 0.55rem;
            border-radius: 999px; white-space: nowrap;
        }
        .card-duration-badge.long {
            background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border);
        }
        .card-duration-badge.medium {
            background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border);
        }
        .card-duration-badge.short {
            background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border);
        }

        /* Report section */
        .report-section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 2rem; margin-bottom: 2.5rem; line-height: 1.8;
        }
        .report-section h2 { font-size: 1.3rem; color: #fff; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .report-section h2:first-child { margin-top: 0; }
        .report-section h3 { font-size: 1.1rem; color: var(--accent); margin-top: 1.2rem; margin-bottom: 0.4rem; }
        .report-section p { color: var(--text); margin-bottom: 0.75rem; }
        .report-section ul { padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .report-section li { margin-bottom: 0.4rem; color: var(--text); }
        .report-section strong { color: #fff; }
        .report-section code { background: var(--surface-alt); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; color: var(--accent); }

        /* Raw data toggle */
        .raw-toggle {
            display: flex; align-items: center; gap: 0.5rem;
            background: none; border: 1px solid var(--border); border-radius: 8px;
            padding: 0.6rem 1.2rem; color: var(--text-muted); font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s; margin-bottom: 1rem;
        }
        .raw-toggle:hover { border-color: var(--accent); color: var(--accent); }
        .raw-toggle svg { transition: transform 0.3s; }
        .raw-toggle.open svg { transform: rotate(90deg); }

        .raw-data {
            display: none; background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem; overflow-x: auto;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem; color: var(--text-muted);
            white-space: pre-wrap; word-wrap: break-word;
            max-height: 500px; overflow-y: auto;
        }
        .raw-data.visible { display: block; }

        .footer {
            text-align: center; padding: 2rem; color: var(--text-muted);
            font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .header { padding: 1.5rem 1rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .report-section { padding: 1.25rem; }
            .card-value { font-size: 1.6rem; }
            .trend-row { grid-template-columns: 140px 1fr 60px; }
            .timeline-axis { margin-left: 140px; }
            .timeline-row { grid-template-columns: 140px 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <div class="logo">
                <svg viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="8" fill="#6c8aff" fill-opacity="0.15"/>
                    <path d="M8 24 L12 16 L16 20 L22 10 L28 18" stroke="#6c8aff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="28" cy="18" r="2.5" fill="#6c8aff"/>
                </svg>
                <h1>Econ<span>Data</span>Hub</h1>
            </div>
            <div class="header-badge">
                <div class="dot"></div>
                Informe de Mercado
            </div>
        </div>
    </div>

    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <p>Consultando datos de mercado y generando informe...</p>
        </div>

        <div id="content" style="display:none;">

            <!-- 1. Trend overview -->
            <div class="section-title">Vista de Tendencias</div>
            <div class="trend-panel" id="trendPanel"></div>

            <!-- 2. Timeline -->
            <div class="section-title">Cobertura Temporal de los Datos</div>
            <div class="timeline-panel" id="timelinePanel"></div>

            <!-- 3. Market data cards -->
            <div id="cards-container"></div>

            <!-- 4. AI Report -->
            <div class="section-title">Informe de Análisis</div>
            <div class="report-section" id="report"></div>

            <!-- 5. Raw data -->
            <button class="raw-toggle" id="rawToggle" onclick="toggleRaw()">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Datos Crudos (JSON)
            </button>
            <pre class="raw-data" id="rawData"></pre>
        </div>

        <div id="error" style="display:none;"></div>
    </div>

    <div class="footer">
        EconDataHub &mdash; Datos de mercado agregados y análisis automatizado
    </div>

    <script>
        /* ── Metadata ── */
        const COUNTRY_META = {
            usa:       { name: 'EE.UU.',       flag: '\u{1F1FA}\u{1F1F8}' },
            euro_area: { name: 'Eurozona',     flag: '\u{1F1EA}\u{1F1FA}' },
            germany:   { name: 'Alemania',     flag: '\u{1F1E9}\u{1F1EA}' },
            france:    { name: 'Francia',      flag: '\u{1F1EB}\u{1F1F7}' },
            italy:     { name: 'Italia',       flag: '\u{1F1EE}\u{1F1F9}' },
            spain:     { name: 'España',       flag: '\u{1F1EA}\u{1F1F8}' },
            uk:        { name: 'R. Unido',     flag: '\u{1F1EC}\u{1F1E7}' },
        };

        const INDICATOR_LABELS = {
            high_yield_spread: 'HY Spread',
            '10y_treasury_yield': 'Treasury 10Y',
            '10y_bund_yield': 'Bund 10Y',
            '10y_bond_yield': 'Bono 10Y',
            rate_unemployment: 'Desempleo',
        };

        const CATEGORY_ORDER = [
            { key: 'high_yield_spread', title: 'Diferenciales de Alto Rendimiento' },
            { key: 'bond',              title: 'Rendimientos de Bonos Soberanos (10 Años)' },
            { key: 'rate_unemployment', title: 'Tasas de Desempleo' },
        ];

        function categorize(indicator) {
            if (indicator === 'high_yield_spread') return 'high_yield_spread';
            if (indicator === 'rate_unemployment') return 'rate_unemployment';
            return 'bond';
        }

        function catClass(indicator) {
            if (indicator === 'high_yield_spread') return 'cat-spread';
            if (indicator === 'rate_unemployment') return 'cat-unemp';
            return 'cat-bond';
        }

        /* ── Formatting helpers ── */
        function fmtVal(v) { return Number(v).toFixed(2); }
        function fmtPct(v) { return (v > 0 ? '+' : '') + Number(v).toFixed(2) + '%'; }
        function fmtDate(d) { return new Date(d).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }); }
        function fmtShortDate(d) { return new Date(d).toLocaleDateString('es-ES', { month: 'short', year: '2-digit' }); }

        function monthsBetween(a, b) {
            const da = new Date(a), db = new Date(b);
            return Math.round((db - da) / (1000 * 60 * 60 * 24 * 30.44));
        }

        function durationLabel(months) {
            if (months >= 12) return Math.round(months / 12) + (Math.round(months / 12) === 1 ? ' año' : ' años');
            return months + (months === 1 ? ' mes' : ' meses');
        }

        function durationClass(months) {
            if (months >= 10) return 'long';
            if (months >= 5) return 'medium';
            return 'short';
        }

        /* ── Build flat list with enriched data ── */
        function enrichItems(marketData) {
            return Object.entries(marketData).map(([key, item]) => {
                const meta = COUNTRY_META[item.country] || { name: item.country, flag: '' };
                const label = INDICATOR_LABELS[item.indicator] || item.indicator;
                const months = monthsBetween(item.observation_start, item.observation_end);
                return { key, ...item, meta, label, months, cat: categorize(item.indicator) };
            });
        }

        /* ========================================================
           1. TREND OVERVIEW — diverging horizontal bar chart
           ======================================================== */
        function renderTrends(items) {
            const panel = document.getElementById('trendPanel');
            const sorted = [...items].sort((a, b) => a.change_pct - b.change_pct);
            const maxAbs = Math.max(...sorted.map(i => Math.abs(i.change_pct)), 1);

            let html = '';
            for (const item of sorted) {
                const pct = item.change_pct;
                const isPos = pct >= 0;
                const halfWidth = (Math.abs(pct) / maxAbs) * 50; // 50% = half the track
                const barLeft = isPos ? 50 : 50 - halfWidth;

                html += `
                <div class="trend-row">
                    <div class="trend-label">
                        <span class="flag">${item.meta.flag}</span>
                        ${item.meta.name} · ${item.label}
                    </div>
                    <div class="trend-bar-track">
                        <div class="trend-bar-fill ${isPos ? 'positive' : 'negative'}"
                             style="left:${barLeft}%; width:${halfWidth}%;"></div>
                    </div>
                    <div class="trend-pct ${isPos ? 'positive' : 'negative'}">${fmtPct(pct)}</div>
                </div>`;
            }

            html += `
            <div class="trend-legend">
                <span><span class="swatch" style="background:var(--red)"></span> Bajada</span>
                <span><span class="swatch" style="background:var(--green)"></span> Subida</span>
            </div>`;

            panel.innerHTML = html;
        }

        /* ========================================================
           2. TIMELINE GANTT — common time axis
           ======================================================== */
        function renderTimeline(items) {
            const panel = document.getElementById('timelinePanel');

            // Find global min/max dates
            const allStarts = items.map(i => new Date(i.observation_start).getTime());
            const allEnds   = items.map(i => new Date(i.observation_end).getTime());
            const globalMin = Math.min(...allStarts);
            const globalMax = Math.max(...allEnds);
            const span = globalMax - globalMin || 1;

            // Check if there are mismatched periods
            const uniqueStarts = new Set(items.map(i => i.observation_start));
            const uniqueEnds   = new Set(items.map(i => i.observation_end));
            const hasMismatch  = uniqueStarts.size > 1 || uniqueEnds.size > 1;

            function pctPos(date) {
                return ((new Date(date).getTime() - globalMin) / span) * 100;
            }

            // Generate month ticks
            const tickDate = new Date(globalMin);
            tickDate.setDate(1);
            if (tickDate.getTime() < globalMin) tickDate.setMonth(tickDate.getMonth() + 1);
            let ticksHtml = '';
            while (tickDate.getTime() <= globalMax) {
                const pos = pctPos(tickDate.toISOString().slice(0, 10));
                ticksHtml += `<span class="timeline-tick" style="left:${pos}%">${fmtShortDate(tickDate.toISOString().slice(0, 10))}</span>`;
                tickDate.setMonth(tickDate.getMonth() + 2); // tick every 2 months
            }

            let html = '';

            if (hasMismatch) {
                html += `<div class="note">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1L15 14H1L8 1Z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 6V9M8 11V11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Los indicadores cubren periodos diferentes — compara con cautela
                </div>`;
            }

            html += `<div class="timeline-axis">${ticksHtml}</div>`;

            // Sort items by start then end
            const sorted = [...items].sort((a, b) => {
                const d = new Date(a.observation_start) - new Date(b.observation_start);
                return d !== 0 ? d : new Date(a.observation_end) - new Date(b.observation_end);
            });

            for (const item of sorted) {
                const left = pctPos(item.observation_start);
                const right = pctPos(item.observation_end);
                const width = right - left;
                const cls = catClass(item.indicator);

                html += `
                <div class="timeline-row">
                    <div class="timeline-label">${item.meta.flag} ${item.meta.name} · ${item.label}</div>
                    <div class="timeline-track">
                        <div class="timeline-bar ${cls}" style="left:${left}%; width:${width}%;"
                             title="${fmtDate(item.observation_start)} — ${fmtDate(item.observation_end)} (${durationLabel(item.months)})"></div>
                        <span class="timeline-duration">${durationLabel(item.months)}</span>
                    </div>
                </div>`;
            }

            html += `
            <div class="timeline-cat-legend">
                <span><span class="swatch" style="background:var(--accent)"></span> HY Spread</span>
                <span><span class="swatch" style="background:var(--orange)"></span> Bonos 10Y</span>
                <span><span class="swatch" style="background:#a78bfa"></span> Desempleo</span>
            </div>`;

            panel.innerHTML = html;
        }

        /* ========================================================
           3. DATA CARDS — with trend arrow + duration badge
           ======================================================== */
        function renderCards(items) {
            const container = document.getElementById('cards-container');
            const groups = {};

            for (const item of items) {
                if (!groups[item.cat]) groups[item.cat] = [];
                groups[item.cat].push(item);
            }

            for (const catDef of CATEGORY_ORDER) {
                const catItems = groups[catDef.key];
                if (!catItems || catItems.length === 0) continue;

                const titleEl = document.createElement('div');
                titleEl.className = 'section-title';
                titleEl.textContent = catDef.title;
                container.appendChild(titleEl);

                const grid = document.createElement('div');
                grid.className = 'cards-grid';

                for (const item of catItems) {
                    const isPositive = item.change_pct >= 0;
                    const arrow = isPositive ? '\u25B2' : '\u25BC';
                    const barWidth = Math.min(Math.abs(item.change_pct) / 30 * 100, 100);
                    const barColor = isPositive ? 'var(--green)' : 'var(--red)';
                    const durCls = durationClass(item.months);

                    // Mini SVG trend arrow
                    const trendSvg = isPositive
                        ? '<svg width="20" height="16" viewBox="0 0 20 16"><path d="M2 12 L10 4 L18 12" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'
                        : '<svg width="20" height="16" viewBox="0 0 20 16"><path d="M2 4 L10 12 L18 4" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';

                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-header">
                                <div class="card-country">
                                    <span class="card-flag">${item.meta.flag}</span>
                                    <span class="card-country-name">${item.meta.name}</span>
                                </div>
                                <span class="card-indicator">${item.label}</span>
                            </div>
                            <div class="card-values">
                                <div class="card-value">${fmtVal(item.latest_value)}</div>
                                <div class="card-prev">
                                    <span class="arrow">${arrow}</span> desde ${fmtVal(item.previous_value)}
                                </div>
                                <span class="card-trend-arrow">${trendSvg}</span>
                            </div>
                            <span class="card-change ${isPositive ? 'positive' : 'negative'}">
                                ${arrow} ${fmtPct(item.change_pct)}
                            </span>
                            <div class="card-bar">
                                <div class="card-bar-fill" style="width:${barWidth}%; background:${barColor};"></div>
                            </div>
                            <div class="card-period">
                                <span class="card-period-dates">${fmtDate(item.observation_start)} — ${fmtDate(item.observation_end)}</span>
                                <span class="card-duration-badge ${durCls}">${durationLabel(item.months)}</span>
                            </div>
                        </div>
                    `;
                }

                container.appendChild(grid);
            }
        }

        /* ── Markdown → HTML ── */
        function markdownToHtml(md) {
            let html = md
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.+?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
            html = html.replace(/(<br>)\*\s{3}/g, '<li>');
            html = html.replace(/(<br>)\*\s/g, '<li>');
            return html;
        }

        function toggleRaw() {
            document.getElementById('rawData').classList.toggle('visible');
            document.getElementById('rawToggle').classList.toggle('open');
        }

        /* ── Main ── */
        async function generateReport() {
            const query = "Genera un informe en castellano";
            const body = { query };

            try {
                const response = await fetch('https://econdatahub.onrender.com/aggregator/analysis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`Error HTTP: ${response.status} - ${errorData.message || 'Error desconocido'}`);
                }

                const data = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                if (data.marketData) {
                    const items = enrichItems(data.marketData);
                    renderTrends(items);
                    renderTimeline(items);
                    renderCards(items);
                }

                document.getElementById('report').innerHTML = markdownToHtml(data.report || '');
                document.getElementById('rawData').textContent = JSON.stringify(data.marketData, null, 2);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                const errorDiv = document.getElementById('error');
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `<div class="error-box">Error al generar el informe: ${error.message.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', generateReport);
    </script>
</body>
</html>
